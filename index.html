<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitClub | Login</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
</head>

<body class="bg-[#1E2423]">
    <div class="min-h-screen flex flex-col items-center justify-center py-6 px-4">
        <div class="p-6 sm:p-8 rounded-2xl bg-[#F2F5F4] border border-[#4F8F86] shadow-xl w-full max-w-md">

            <!-- Logo -->
            <img src="/assets/logo.png" alt="GitClub Logo" class="h-20 mx-auto mb-4">

            <!-- Title -->
            <h1 class="text-[#4F8F86] text-center text-xl font-bold">GitClub Issues Tracker</h1>
            <h2 class="text-[#1B1F1E] text-center text-sm font-semibold opacity-80">Sign in to manage your issues</h2>

            <form id="login-form" class="mt-12 space-y-6">

                <!-- Username -->
                <div>
                    <label class="text-[#1B1F1E] text-sm font-medium mb-2 block">User name</label>
                    <div class="relative flex items-center">
                        <input id="username" name="username" type="text" required
                            class="w-full text-[#1B1F1E] text-sm border border-[#6B7572] px-4 py-3 pr-8 rounded-md focus:outline-none focus:ring-2 focus:ring-[#4F8F86] focus:border-[#4F8F86]"
                            placeholder="Enter user name" />
                        <svg xmlns="http://www.w3.org/2000/svg" fill="#bbb" stroke="#bbb"
                            class="w-4 h-4 absolute right-4" viewBox="0 0 24 24">
                            <circle cx="10" cy="7" r="6"></circle>
                            <path
                                d="M14 15H6a5 5 0 0 0-5 5 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 5 5 0 0 0-5-5zm8-4h-2.59l.3-.29a1 1 0 0 0-1.42-1.42l-2 2a1 1 0 0 0 0 1.42l2 2a1 1 0 0 0 1.42 0 1 1 0 0 0 0-1.42l-.3-.29H22a1 1 0 0 0 0-2z">
                            </path>
                        </svg>
                    </div>
                    <h4 class="text-sm mt-1 text-[#4F8F86]">Default User: admin</h4>
                </div>

                <!-- Password -->
                <div>
                    <label class="text-[#1B1F1E] text-sm font-medium mb-2 block">Password</label>
                    <div class="relative flex items-center">
                        <input id="password" name="password" type="password" required
                            class="w-full text-[#1B1F1E] text-sm border border-[#6B7572] px-4 py-3 pr-8 rounded-md focus:outline-none focus:ring-2 focus:ring-[#4F8F86] focus:border-[#4F8F86]"
                            placeholder="Enter password" />
                        <svg xmlns="http://www.w3.org/2000/svg" fill="#bbb" stroke="#bbb"
                            class="w-4 h-4 absolute right-4 cursor-pointer" viewBox="0 0 128 128">
                            <path
                                d="M64 104C22.127 104 1.367 67.496.504 65.943a4 4 0 0 1 0-3.887C1.367 60.504 22.127 24 64 24s62.633 36.504 63.496 38.057a4 4 0 0 1 0 3.887C126.633 67.496 105.873 104 64 104zM8.707 63.994C13.465 71.205 32.146 96 64 96c31.955 0 50.553-24.775 55.293-31.994C114.535 56.795 95.854 32 64 32 32.045 32 13.447 56.775 8.707 63.994zM64 88c-13.234 0-24-10.766-24-24s10.766-24 24-24 24 10.766 24 24-10.766 24-24 24zm0-40c-8.822 0-16 7.178-16 16s7.178 16 16 16 16-7.178 16-16-7.178-16-16-16z">
                            </path>
                        </svg>
                    </div>
                    <h4 class="text-sm mt-1 text-[#4F8F86]">Default Password: admin123</h4>
                </div>

                <!-- Sign In Button -->
                <div class="!mt-12">
                    <button type="button"
                        class="w-full py-2 px-4 text-[15px] font-medium tracking-wide rounded-md text-white bg-[#9B5E3C] hover:bg-[#7A472E] focus:outline-none cursor-pointer">
                        Sign in
                    </button>
                </div>

            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
