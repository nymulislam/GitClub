<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitClub | Dashboard</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-[#f8fafc]">

    <nav class="container mx-auto rounded-md px-6 py-3 bg-[#1e293b] shadow-lg flex items-center justify-between">

        <div class="flex items-center gap-4">
            <img src="assets/logo.png" alt="GitClub Logo" class="h-12">
            <h1 class="text-2xl font-bold text-white">GitClub Issues Tracker</h1>
        </div>

        <form class="flex gap-2 items-center">
            <input type="search" placeholder="Search issues..."
                class="w-40 md:w-60 px-4 py-2 rounded-md bg-[#334155] text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-[#14b8a6]" />

            <button class="bg-[#d4a373] hover:bg-[#c48f5c] text-white px-4 py-2 rounded-md font-semibold">
                <i class="fa-solid fa-plus mr-1"></i>Search
            </button>
        </form>

    </nav>

    <!-- Tabs -->
    <div
        class="container mx-auto my-10 px-5 shadow-lg rounded-md bg-white border border-gray-200 flex justify-center max-w-md select-none">

        <button class="flex-1 py-3 font-semibold text-[#14b8a6] border-b-4 border-[#14b8a6]">
            All
        </button>

        <button
            class="flex-1 py-3 font-semibold text-gray-500 border-b-4 border-transparent hover:bg-gray-50 hover:text-[#14b8a6]">
            Open
        </button>

        <button
            class="flex-1 py-3 font-semibold text-gray-500 border-b-4 border-transparent hover:bg-gray-50 hover:text-[#14b8a6]">
            Closed
        </button>

    </div>

    <!-- Main Content -->
    <div class="container mx-auto px-5 shadow-md p-6 rounded-md bg-white border border-gray-200">

        <div class="flex justify-between items-center mb-6 p-5 rounded-md border border-[#d4a373] bg-[#fff7ed]">

            <div class="flex items-center gap-4">
                <img src="assets/Aperture.png" class="h-10 rounded-full p-1 bg-purple-400/15" />

                <div>
                    <h1 id="issues-count" class="text-[#14b8a6] text-xl font-bold">

                    </h1>

                    <h2 class="text-[#334155] text-sm font-semibold">
                        Your one-stop solution for issue tracking
                    </h2>
                </div>

            </div>

            <div class="flex gap-8 text-sm font-semibold text-[#334155]">

                <div class="flex items-center gap-2">
                    <div class="bg-green-500 h-4 w-4 rounded-full"></div>
                    <p>Open</p>
                </div>

                <div class="flex items-center gap-2">
                    <div class="bg-red-500 h-4 w-4 rounded-full"></div>
                    <p>Closed</p>
                </div>

            </div>

        </div>

        <!-- 3D CARD-->
        <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Issue cards will be dynamically inserted here -->
        </div>

    </div>

    <script src="dashboard.js"></script>

</body>

</html>
