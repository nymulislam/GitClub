<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitClub | Dashboard</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-[#f8fafc]">

    <nav class="container mx-auto rounded-md px-3 py-2 md:px-6 md:py-3 bg-[#1e293b] shadow-lg flex items-center justify-between">

        <div class="flex items-center gap-4">
            <img src="assets/logo.png" alt="GitClub Logo" class="h-12">
            <h1 class="text-sm md:text-2xl hidden md:block font-bold text-white">GitClub Issues Tracker</h1>
        </div>

        <form class="flex gap-2 items-center">
            <input type="search" placeholder="Search issues..."
                class="w-36 md:w-60 px-4 py-2 rounded-md bg-[#334155] text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-[#14b8a6]" />

            <button class="bg-[#d4a373] hover:bg-[#c48f5c] text-white px-4 py-2 rounded-md font-semibold">
                <span class="hidden md:inline mr-1"><i class="fa-solid fa-plus"></i></span>Search
            </button>
        </form>

    </nav>

    <!-- Tabs -->
    <div
        class="container mx-auto my-10 px-5 shadow-lg rounded-md bg-white border border-gray-200 flex justify-center max-w-md select-none">

        <button class="flex-1 py-3 font-semibold text-[#14b8a6] border-b-4 border-[#14b8a6]">
            All
        </button>

        <button
            class="flex-1 py-3 font-semibold text-gray-500 border-b-4 border-transparent hover:bg-gray-50 hover:text-[#14b8a6]">
            Open
        </button>

        <button
            class="flex-1 py-3 font-semibold text-gray-500 border-b-4 border-transparent hover:bg-gray-50 hover:text-[#14b8a6]">
            Closed
        </button>

    </div>

    <!-- Main Content -->
    <div class="container mx-auto px-5 shadow-md p-6 rounded-md bg-white border border-gray-200">

        <div class="flex flex-col-reverse md:flex-row justify-between items-center mb-6 p-5 gap-2 rounded-md border border-[#d4a373] bg-[#fff7ed]">

            <div class="flex items-center gap-4">
                <img src="assets/Aperture.png" class="h-10 rounded-full p-1 bg-purple-400/15" />

                <div>
                    <h1 id="issues-count" class="text-[#14b8a6] text-lg md:text-xl font-bold">

                    </h1>

                    <h2 class="text-[#334155] text-sm font-semibold">
                        Your one-stop solution for issue tracking
                    </h2>
                </div>

            </div>

            <div class="flex gap-8 text-sm font-semibold text-[#334155]">

                <div class="flex items-center gap-2">
                    <div class="bg-green-500 h-2 w-2 rounded-full"></div>
                    <p>Open</p>
                </div>
                <div class="flex items-center gap-2">
                    <div class="bg-red-500 h-2 w-2 rounded-full"></div>
                    <p>Closed</p>
                </div>

            </div>

        </div>

        <!-- 3D CARD-->
        <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Issue cards will be dynamically inserted here -->
        </div>

    </div>

    <!-- Open the modal using ID.showModal() method -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box space-y-4">
            <h3 id="modal-title" class="text-lg font-bold">Fix broken image uploads</h3>
            <div>
                <ul class="flex gap-8 text-sm">
                    <div id="modal-status" class="badge badge-soft text-white font-semibold">Opened</div>
                    <li id="modal-openedBy" class="list-disc">Opened by John Doe</li>
                    <li id="modal-updated-at" class="list-disc">22/2/2023</li>
                </ul>
            </div>
            <div>
                <div class="badge badge-outline border-[#d4a373] text-[#d4a373] font-semibold">
                   <i class="fa-solid fa-bug"></i> bug
                </div>
                <div class="badge badge-outline border-[#14b8a6] text-[#14b8a6] font-semibold">
                    <i class="fa-solid fa-futbol"></i>help wanted
                </div>
            </div>

            <p id="modal-description" class="py-4">Press ESC key or click the button below to close</p>

            <div class="flex items-center justify-between bg-[#fff7ed] p-5 rounded-md">
                <div class="space-y-2">
                    <h2 class="text-sm text-gray-500">Assignee:</h2>
                    <p id="modal-assignee" class="font-bold text-lg">
                        Fahim Ahmad
                        </p>
                </div>
                <div class="space-y-2">
                    <h2 class="font-bold text-lg">Priority:</h2>
                    <p id="modal-priority" class="badge bg-[#d4a373] text-white font-semibold">
                        High
                        </p>
                </div>
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn bg-[#d4a373] hover:bg-[#c48f5c] text-white px-4 py-2 rounded-md font-semibold">Close</button>
                </form>
            </div>
        </div>
    </dialog>
    <script src="dashboard.js"></script>

</body>

</html>
